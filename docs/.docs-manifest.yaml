# docs/.docs-manifest.yaml — local source of truth for this
# repo's /docs. Generated by `gen_docs bootstrap` from a contract
# template, then adapted to this repo (triggers.paths / produces.params
# resolved against the actual tree by the generate-docs skill).

schema_version: 1
domain: backend
service: mad
generator_skill: generate-docs
docs:
  - path: docs/01-overview/index.md
    section: Overview
    kind: manual
    description: |
      What this service is and why it exists: its responsibility, the bounded
      context it owns, the systems it talks to (upstream/downstream), and what
      it explicitly does NOT do. Intent-level — written for a new engineer.
    triggers:
      paths:
        - src/mad/__init__.py
        - src/mad/entry_points/**
        - src/mad/adapters/inbound/http/app.py
        - src/mad/adapters/inbound/http/dependencies.py
        - pyproject.toml
        - README.md
      discovery_hint: "The service entrypoints and the top-level package layout — where the application is wired together (handlers, app factory, package roots)."
      hint: "Re-validate when the service's responsibilities or external boundaries change; this is intent, not code, so it is checked by age, not diff."
      max_age_days: 180
    acknowledged_at_commit: 7e3be29825257201e8b6cc0155d063d834dadbbb
  - path: docs/02-architecture/architecture.md
    section: Architecture
    kind: heuristic
    description: |
      The service's internal architecture: its layering/style (e.g. hexagonal
      ports & adapters, layered, MVC), how a request or event flows through the
      layers, where the business core sits versus infrastructure, and the main
      extension points. Faithful to the code's actual structure — name the real
      layers, not a generic diagram.
    triggers:
      paths:
        - src/mad/core/**
        - src/mad/adapters/**
      discovery_hint: "The business-core layer and the adapter/infrastructure layer — the directories that hold use cases / domain logic and those that hold inbound/outbound integrations."
      hint: "Fires when the core or adapter layers move or are restructured."
    acknowledged_at_commit: 7e3be29825257201e8b6cc0155d063d834dadbbb
  - path: docs/02-architecture/source-tree.md
    section: Architecture
    kind: deterministic
    description: |
      An exact ASCII tree of the application source root, derived from
      git-tracked files — no prose, no judgement.
    triggers:
      paths:
        - src/mad/**
      discovery_hint: "The application source root (the package that holds production code)."
    produces:
      type: script
      command: [gen_docs, source-tree]
      params:
        root: src/mad
      params_needed:
        root:
          description: Repo-relative path to the application source root.
          default: src
    acknowledged_at_commit: 7e3be29825257201e8b6cc0155d063d834dadbbb
  - path: docs/02-architecture/test-tree.md
    section: Architecture
    kind: deterministic
    description: |
      An exact ASCII tree of the test root, derived from git-tracked files.
    triggers:
      paths:
        - tests/**
      discovery_hint: "The test root (the directory holding unit/integration/e2e tests)."
    produces:
      type: script
      command: [gen_docs, test-tree]
      params:
        root: tests
      params_needed:
        root:
          description: Repo-relative path to the test root.
          default: tests
    acknowledged_at_commit: 7e3be29825257201e8b6cc0155d063d834dadbbb
  - path: docs/03-api/api-reference.md
    section: API
    kind: deterministic
    description: |
      The HTTP API surface dumped from the application object as an OpenAPI
      spec — routes, methods, schemas. Runs only if the repo declares an app
      object; a service with no HTTP surface leaves this entry unadapted.
    triggers:
      paths:
        - src/mad/adapters/inbound/http/**
      discovery_hint: "The module that builds/exposes the web application object (e.g. a FastAPI/Flask/Starlette app factory or instance)."
    produces:
      type: script
      command: [gen_docs, api]
      params:
        app_module: mad.adapters.inbound.http.asgi
        app_attr: app
      params_needed:
        app_module:
          description: Importable module path holding the app object (e.g. `src.adapters.inbound.http.app`). Stack-specific — no default.
        app_attr:
          description: Attribute name of the app object within that module (e.g. `app`).
    acknowledged_at_commit: 7e3be29825257201e8b6cc0155d063d834dadbbb
  - path: docs/03-data/data-model.md
    section: Data
    kind: heuristic
    description: |
      The persistent data model: the entities the service owns, their key
      attributes and relationships, and the storage strategy actually used
      (e.g. relational tables, a DynamoDB single-table design, documents).
      Trace every claim to the domain models, schemas, or repository code.
    triggers:
      paths:
        - src/mad/core/sessions/domain/**
        - src/mad/core/events/domain/**
        - src/mad/adapters/outbound/persistence/**
      discovery_hint: "The domain entities/models and the persistence layer (repositories, schema/migration definitions, table or collection declarations)."
      hint: "Fires when domain models, migrations, or repository contracts change."
    acknowledged_at_commit: 7e3be29825257201e8b6cc0155d063d834dadbbb
  - path: docs/04-configuration/configuration.md
    section: Configuration
    kind: heuristic
    description: |
      Every configuration / environment variable the service reads, each with
      its purpose, type, default (if any), and whether it is required. Mad has
      no central settings class today — variables are read via os.environ /
      os.getenv across adapters and enumerated in `.env.example`; document that
      surface. Mark secrets as such — never echo their values. (Centralization
      of env-var access is tracked as a follow-up; once it lands, re-point this
      entry at the settings module via the deterministic `config` generator.)
    triggers:
      paths:
        - .env.example
        - compose.example.yml
        - src/mad/entry_points/cli.py
        - src/mad/adapters/inbound/http/app.py
        - src/mad/adapters/outbound/agents/**
      discovery_hint: "The settings/configuration surface — where environment variables are declared, parsed, and read. No central settings class exists here; the surface is `.env.example` plus the os.environ/os.getenv reads across adapters."
      hint: "Fires when an environment variable is added, dropped, or renamed — in `.env.example` or in a module that reads it."
    acknowledged_at_commit: 7e3be29825257201e8b6cc0155d063d834dadbbb
  - path: docs/05-operations/ci-cd.md
    section: Operations
    kind: heuristic
    description: |
      How the service is built, tested, and deployed: the CI/CD jobs, their
      triggers and ordering, and what each gate enforces. A generator lays the
      skeleton from the workflow files; the prose explains the pipeline intent.
    triggers:
      paths:
        - .github/workflows/**
      discovery_hint: "The CI/CD workflow definitions (the continuous-integration and deploy pipeline files)."
      hint: "Fires when a workflow job, trigger, or deploy step changes."
    produces:
      type: script
      command: [gen_docs, ci-cd]
      params:
        workflows_dir: .github/workflows
      params_needed:
        workflows_dir:
          description: Repo-relative path to the CI/CD workflows directory.
          default: .github/workflows
    acknowledged_at_commit: 7e3be29825257201e8b6cc0155d063d834dadbbb
  - path: docs/05-operations/scripts.md
    section: Operations
    kind: deterministic
    description: |
      The developer task surface: the Makefile targets and any standalone
      scripts, each with the one-line description the source already carries.
    triggers:
      paths:
        - Makefile
      discovery_hint: "The task runner (Makefile or equivalent) and any scripts directory."
    produces:
      type: script
      command: [gen_docs, scripts]
      params:
        makefile: Makefile
        scripts_dir: scripts
      params_needed:
        makefile:
          description: Repo-relative path to the Makefile (or task file).
          default: Makefile
        scripts_dir:
          description: Repo-relative path to the standalone scripts directory.
          default: scripts
    acknowledged_at_commit: 7e3be29825257201e8b6cc0155d063d834dadbbb
  - path: docs/06-changelog/changelog.md
    section: Changelog
    kind: heuristic
    description: |
      The package's released versions and what changed in each, sourced from
      the semantic-release package changelog (`CHANGELOG.md` at the repo root —
      the consumer-facing history grouped by Features / Bug Fixes per release).
      NOT a raw `git log`: only released, version-tagged changes that a
      `mad-bros` consumer would inherit belong here. Mirror `CHANGELOG.md`
      faithfully; do not invent or reorder entries.
    triggers:
      paths:
        - CHANGELOG.md
      discovery_hint: "The package's released changelog — `CHANGELOG.md` at the repo root, generated by python-semantic-release (`[tool.semantic_release]` in pyproject.toml)."
      hint: "Fires when `CHANGELOG.md` changes — i.e. a new release is cut."
    acknowledged_at_commit: 7e3be29825257201e8b6cc0155d063d834dadbbb
bootstrap_commit: 7e3be29825257201e8b6cc0155d063d834dadbbb
