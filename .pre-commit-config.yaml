# Pre-commit hooks — see CLAUDE.md and .claude/memories/testing-heuristic.md
# Run locally with: make precommit
# Install once with:  pre-commit install

repos:
  # ----------------------------------------------------------------------
  # Hygiene — file-level invariants
  # ----------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-case-conflict

  # ----------------------------------------------------------------------
  # ruff — formatter + linter (replaces black, isort, flake8, bandit-lite)
  # ----------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  # ----------------------------------------------------------------------
  # mypy — strict on mad.core (configured in pyproject.toml)
  # ----------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^src/mad/core/
        additional_dependencies: []

  # ----------------------------------------------------------------------
  # gitleaks — block accidental secret commits (CLAUDE.md hard rule 2)
  # ----------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
